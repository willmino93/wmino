subheader: "Senior Data Analyst | eCommerce & Business Intelligence"

summary: >-
  Results-driven Senior Data Analyst with 9 years of experience turning complex eCommerce, product, and
  business data into actionable insights through end-to-end analytics pipelines. Expertise in SQL, Python,
  Tableau, Power BI, Excel, and modern BI & AI tools (Cursor, Claude Opus). Skilled in funnel analysis, process
  optimization, and advanced data analytics. Proven ability to translate complex datasets into business decisions
  and drive measurable outcomes across cross-functional teams.

