subheader: Senior Data Analyst | Analytics Lead | AI & Data Strategy
summary: Results-driven Senior Data Analyst with 9+ years of experience leading large-scale,
  cross-functional analytics initiatives and building scalable data solutions. Expertise
  in SQL, Python, R, and cloud platforms (AWS, Snowflake), with strong experience
  in data engineering, AI/ML applications, and advanced analytics. Skilled in data
  modeling, forecasting, automation, and enterprise reporting. Proven ability to architect
  data pipelines, translate complex datasets into strategic insights, and drive measurable
  business outcomes while mentoring analysts and influencing executive decision-making.
